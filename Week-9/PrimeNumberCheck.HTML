<!DOCTYPE html>
<html>
    <head>
        <title>Prime Number Checker</title>
    </head>
    <body>
        <h2>Check Prime Number</h2>
        <p>Type one number:</p>
        <input id="number" type="text">
        <br><br>
        <button onclick="checkPrime()">Check</button>
        <iframe id="resultFrame" width="300" height="100"></iframe>
        <script>
            function checkPrime()
            {
                var num = document.getElementById("number").value;
                var result = "";
                if(num === "" || isNaN(num))
                {
                    result = "<p>That is not a number!</p>";
                }
                else
                {
                    num = Number(num);
                    if(num<=1)
                    {
                        result = "<p>"+num+" is NOT Prime</p>";
                    }
                    else
                    {
                        var isPrime=true;
                        for(var i = 2;i<num;i++)
                        {
                            if(num%i===0)
                            {
                                isPrime=false;
                                break;
                            }
                        }
                        if(isPrime)
                        {
                            result="<p>"+num+" is Prime</p>";
                        }
                        else 
                        {
                            result="<p>"+num+" is NOT Prime</p>";
                        }
                    }
                }
                document.getElementById("resultFrame").contentDocument.body.innerHTML=result;
            }
        </script>
    </body>
</html>
