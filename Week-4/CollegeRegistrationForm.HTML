<!DOCTYPE html>
<html>
    <head>
        <style>
            table, th, td 
            {
                border: 2px solid black;
                border-collapse: collapse;
            }
        </style>
        <title>College Registration Form</title>
    </head>
    <body>
        <h3 style="text-align: center;">T.Naga Siddhardha (AV.SC.U4CSE25151)</h3>
        <h1 style="text-align: center;">College Registration Form</h1>
        <form>
            <table style="margin: auto;">
                <tr>
                    <td>
                        <label for="fname">Full Name:</label>
                    </td>
                    <td>
                        <input type="text" name="fname" id="fname" placeholder="Full Name">
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="email">Email ID</label>
                    </td>
                    <td>
                        <input id="email" type="email" placeholder="email" name="email">
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="number">Phone Number</label>
                    </td>
                    <td>
                        <input id="number" name="number" type="number" placeholder="Phone Number">
                    </td>
                </tr>
                <tr>
                    <td>
                        Gender
                    </td>
                    <td>
                        <input type="radio" id="male" name="Gender">
                        <label for="male">Male</label>
                        <input type="radio" id="female" name="Gender">
                        <label for="female">Female</label>
                        <input type="radio" id="others" name="Gender">
                        <label for="others">Others</label>
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="course">Course</label>
                    </td>
                    <td>
                        <select id="course" name="course">
                            <option value="cse">CSE</option>
                            <option value="ece">ECE</option>
                            <option value="eee">EEE</option>
                            <option value="cce">CCE</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <td>
                        Hobbies
                    </td>
                    <td>
                        <input type="checkbox" id="sing" value="singing" name="sing">
                        <label for="sing">Singing</label>
                        <input type="checkbox" id="play" value="playing" name="play">
                        <label for="play">Playing</label>
                        <input type="checkbox" id="read" value="reading" name="read">
                        <label for="read">Reading</label>
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="DOB">Date of Birth</label>
                    </td>
                    <td>
                        <input id="DOB" name="DOB" type="date">
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="cert">Certifications</label>
                    </td>
                    <td>
                        <input type="file" id="cert" name="cert">
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="addr">Address</label>
                    </td>
                    <td>
                        <textarea rows="10" cols="20"></textarea>
                    </td>
                </tr>
                <tr>
                    <td colspan="2" style="text-align: center;">
                        <input type="submit">
                    </td>
                </tr>
            </table>
        </form>
    </body>
</html>
