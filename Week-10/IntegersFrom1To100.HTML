<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Integers from 1 to 100</title>
    </head>
    <body>
        <h1>Integers from 1 to 100</h1>
        <p id="result"></p>
        <button onclick="Integers()">1 to 100</button>
        <script>
            function Integers()
            {
                for (var i = 1; i <= 100; i++)
                {
                    if (i%3===0 && i%5===0)
                    {
                        document.getElementById("result").innerHTML +=  " LOL OK<br>";
                    }
                    else if (i % 3 === 0)
                    {
                        document.getElementById("result").innerHTML +=  " LOL<br>";
                    }
                    else if (i % 5 === 0)
                    {
                        document.getElementById("result").innerHTML +=  " OK<br>";
                    }
                    else
                    {
                        document.getElementById("result").innerHTML +=  i + "<br>";
                    }
                }
            }
        </script>
    </body>
</html>
